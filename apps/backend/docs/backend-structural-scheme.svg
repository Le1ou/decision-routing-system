<svg width="680" height="648" viewBox="0 0 680 648" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Структурная схема серверной части</title>
<desc>Структурная схема: веб-клиент, тесты и конфигурация сверху; внутри серверной части четыре слоя — HTTP API, фоновые процессы, бизнес-логика, интеграции; внизу внешние системы PostgreSQL, MinIO, Active Directory и SMTP.</desc>
