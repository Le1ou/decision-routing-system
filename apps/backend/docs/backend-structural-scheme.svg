  text { font-family: Arial, Helvetica, sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #4a4a4a; }
  .box { fill: #f6f5f0; stroke: #5f5e5a; stroke-width: 0.75; }
  .grp { fill: none; stroke: #8a8880; stroke-width: 0.75; stroke-dasharray: 5 4; }
  .arr { stroke: #3a3a38; stroke-width: 1.25; fill: none; }
  .cap { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 13px; fill: #4a4a4a; }
</style>
