openapi: 3.1.0
info:
  title: Decision Routing System API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /auth/me:
    get:
      tags:
      - Auth
      summary: Получить текущего пользователя
      description: Возвращает пользователя, найденного через Basic Auth/Active Directory,
        его роль, отдел, должность и права frontend.
      operationId: get_current_user_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
      security:
      - HTTPBasic: []
  /applications:
    get:
      tags:
      - Applications
      summary: Получить список заявок
      description: Без query-параметров backend возвращает список заявок по умолчанию
        для текущего пользователя. Видимость заявок определяется ролью пользователя
        на backend.
      operationId: list_applications_applications_get
      security:
      - HTTPBasic: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: priority
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Priority
      - name: createdByMe
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Createdbyme
      - name: assignedToMe
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Assignedtome
      - name: delegatedToMyDepartment
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Delegatedtomydepartment
      - name: executorName
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Executorname
      - name: applicationId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Applicationid
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: priority
          title: Sortby
      - name: sortDirection
        in: query
        required: false
        schema:
          type: string
          default: desc
          title: Sortdirection
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Pagesize
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Applications
      summary: Создать заявку
      description: Создает заявку от имени текущего пользователя. Приоритет и статус
        рассчитывает backend. Вложения загружаются отдельным запросом, если frontend
        реально отправляет файлы.
      operationId: create_application_applications_post
      security:
      - HTTPBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationPayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /applications/{applicationId}:
    get:
      tags:
      - Applications
      summary: Получить карточку заявки
      operationId: get_application_applications__applicationId__get
      security:
      - HTTPBasic: []
      parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: integer
          title: Applicationid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /applications/{applicationId}/actions:
    post:
      tags:
      - Applications
      summary: Выполнить действие над заявкой
      description: Единая точка для действий из карточки заявки. Backend проверяет
        роль пользователя, текущий статус заявки и обязательность полей для конкретного
        action.
      operationId: application_action_applications__applicationId__actions_post
      security:
      - HTTPBasic: []
      parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: integer
          title: Applicationid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationActionPayload'
            examples:
              assignExecutor:
                summary: assignExecutor
                value:
                  action: assignExecutor
                  executorId: '2'
                  comment: Назначено вручную руководителем.
              delegateExternal:
                summary: delegateExternal
                value:
                  action: delegateExternal
                  departmentId: oge
                  comment: Работы относятся к ОГЭ.
              complete:
                summary: complete
                value:
                  action: complete
                  resultText: Работы выполнены, доступ проверен.
              changeWorkType:
                summary: changeWorkType
                value:
                  action: changeWorkType
                  workTypeId: '3'
              cancel:
                summary: cancel
                value:
                  action: cancel
                  comment: Заявка создана ошибочно.
              archive:
                summary: archive
                value:
                  action: archive
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /applications/{applicationId}/attachments:
    post:
      tags:
      - Applications
      summary: Загрузить вложения к заявке
      description: Frontend отправляет файлы на backend через multipart/form-data.
        Backend проверяет права, загружает файлы в S3 и сохраняет метаданные вложений
        в БД. Frontend не работает с S3 напрямую.
      operationId: upload_attachments_applications__applicationId__attachments_post
      security:
      - HTTPBasic: []
      parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: integer
          title: Applicationid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_attachments_applications__applicationId__attachments_post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /departments:
    get:
      tags:
      - Directories
      summary: Получить отделы
      operationId: get_departments_departments_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentListResponse'
      security:
      - HTTPBasic: []
  /employees:
    get:
      tags:
      - Directories
      summary: Получить сотрудников, подключенных к системе
      description: Обычный руководитель получает сотрудников только своего отдела.
        top-manager может получать сотрудников всех отделов и фильтровать по departmentId.
      operationId: get_employees_employees_get
      security:
      - HTTPBasic: []
      parameters:
      - name: departmentId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Departmentid
      - name: isActive
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Isactive
      - name: role
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Role
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Directories
      summary: Добавить AD-пользователя в систему
      description: Не создает человека в AD. Backend создает локальную запись участия
        в системе для уже существующего AD-пользователя. Роль выбирает руководитель,
        должность приходит из AD. Обычный руководитель может добавлять сотрудников
        только в свой отдел, top-manager — в любой.
      operationId: add_employee_employees_post
      security:
      - HTTPBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeePayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /employees/{employeeId}:
    patch:
      tags:
      - Directories
      summary: Изменить роль сотрудника или участие в распределении
      description: Обычный руководитель может менять только сотрудников своего отдела,
        top-manager — любого отдела.
      operationId: update_employee_employees__employeeId__patch
      security:
      - HTTPBasic: []
      parameters:
      - name: employeeId
        in: path
        required: true
        schema:
          type: integer
          title: Employeeid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeePayload'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Directories
      summary: Удалить сотрудника из системы
      description: Удаляет локальную запись участия сотрудника в системе, не удаляя
        пользователя из AD. Обычный руководитель может удалять только сотрудников
        своего отдела, top-manager — любого отдела.
      operationId: delete_employee_employees__employeeId__delete
      security:
      - HTTPBasic: []
      parameters:
      - name: employeeId
        in: path
        required: true
        schema:
          type: integer
          title: Employeeid
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /departments/{departmentId}/delegation-settings:
    patch:
      tags:
      - Directories
      summary: Изменить подтверждение делегирования внутри отдела
      description: Обычный руководитель меняет только свой отдел, top-manager — любой.
      operationId: update_department_delegation_settings_departments__departmentId__delegation_settings_patch
      security:
      - HTTPBasic: []
      parameters:
      - name: departmentId
        in: path
        required: true
        schema:
          type: integer
          title: Departmentid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentDelegationSettingsPayload'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /positions:
    get:
      tags:
      - Directories
      summary: Получить должности
      description: Должность сотрудника приходит из AD и не редактируется руководителем
        вручную. Соответствует таблице post.
      operationId: get_positions_positions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionListResponse'
      security:
      - HTTPBasic: []
  /grades:
    get:
      tags:
      - Directories
      summary: Получить грейды
      description: Грейды используются только в матрице допустимости вида работ и
        не являются должностью сотрудника. Соответствует таблице grade.
      operationId: get_grades_grades_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeListResponse'
      security:
      - HTTPBasic: []
  /ad/users:
    get:
      tags:
      - Directories
      summary: Найти пользователей AD для добавления в систему
      description: Returns AD people not yet onboarded into the system (addable candidates).
      operationId: get_ad_users_ad_users_get
      security:
      - HTTPBasic: []
      parameters:
      - name: query
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
      - name: departmentId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Departmentid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdUserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /work-types:
    get:
      tags:
      - Directories
      summary: Получить виды работ
      description: Все авторизованные пользователи видят виды работ всех отделов и
        могут фильтровать их по departmentId.
      operationId: get_work_types_all_work_types_get
      security:
      - HTTPBasic: []
      parameters:
      - name: departmentId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Departmentid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkTypeListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Directories
      summary: Создать вид работ
      description: Обычный руководитель создает виды работ только для своего отдела,
        top-manager — для любого.
      operationId: create_work_type_work_types_post
      security:
      - HTTPBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkTypePayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /work-types/{workTypeId}:
    patch:
      tags:
      - Directories
      summary: Изменить вид работ, сложность или допустимые грейды
      description: Обычный руководитель может менять виды работ только своего отдела,
        top-manager — любого.
      operationId: update_work_type_work_types__workTypeId__patch
      security:
      - HTTPBasic: []
      parameters:
      - name: workTypeId
        in: path
        required: true
        schema:
          type: integer
          title: Worktypeid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkTypePayload'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Directories
      summary: Удалить вид работ
      description: Обычный руководитель может удалять виды работ только своего отдела,
        top-manager — любого.
      operationId: delete_work_type_work_types__workTypeId__delete
      security:
      - HTTPBasic: []
      parameters:
      - name: workTypeId
        in: path
        required: true
        schema:
          type: integer
          title: Worktypeid
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /priority-settings:
    get:
      tags:
      - Priority
      summary: Получить коэффициенты расчета приоритета
      description: Обычный руководитель получает настройки только своего отдела в
        режиме чтения. top-manager получает все отделы и может редактировать.
      operationId: get_priority_settings_priority_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrioritySettingsModel'
      security:
      - HTTPBasic: []
    put:
      tags:
      - Priority
      summary: Сохранить коэффициенты расчета приоритета
      description: Доступно только top-manager.
      operationId: update_priority_settings_priority_settings_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrioritySettingsModel'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrioritySettingsModel'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBasic: []
  /notifications:
    get:
      tags:
      - Notifications
      summary: Получить уведомления текущего пользователя
      description: 'Текущий контракт рассчитан на pull-модель: backend создает уведомления
        при событиях системы, frontend периодически запрашивает список или обновляет
        его после действий пользователя.'
      operationId: get_notifications_notifications_get
      security:
      - HTTPBasic: []
      parameters:
      - name: unreadOnly
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Unreadonly
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /notifications/{notificationId}/read:
    post:
      tags:
      - Notifications
      summary: Отметить уведомление прочитанным
      operationId: mark_notification_read_notifications__notificationId__read_post
      security:
      - HTTPBasic: []
      parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: integer
          title: Notificationid
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /notifications/read-all:
    post:
      tags:
      - Notifications
      summary: Отметить все уведомления текущего пользователя прочитанными
      operationId: mark_all_notifications_read_notifications_read_all_post
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBasic: []
  /reports/applications:
    get:
      tags:
      - Reports
      summary: Сформировать предварительный отчет по заявкам
      description: Возвращает JSON-данные для предпросмотра отчета. Фильтры передаются
        query-параметрами, потому что формирование отчета не меняет состояние backend.
      operationId: report_applications_reports_applications_get
      security:
      - HTTPBasic: []
      parameters:
      - name: createdFrom
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Createdfrom
      - name: createdTo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Createdto
      - name: finishedFrom
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Finishedfrom
      - name: finishedTo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Finishedto
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: executorId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Executorid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationReportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /reports/applications.xls:
    get:
      tags:
      - Reports
      summary: Скачать XLS-отчет по заявкам
      description: Возвращает готовый XLS-файл по тем же фильтрам, что и предпросмотр
        отчета. Генерация файла выполняется на backend.
      operationId: report_applications_xls_reports_applications_xls_get
      security:
      - HTTPBasic: []
      parameters:
      - name: createdFrom
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Createdfrom
      - name: createdTo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Createdto
      - name: finishedFrom
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Finishedfrom
      - name: finishedTo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Finishedto
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: executorId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Executorid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
