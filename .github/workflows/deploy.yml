name: Deploy

on:
 push:
  branches:
   - develop

jobs:
 deploy:
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}

        script: |
          cd ~/decision-routing-system

          # Удаляем локальные изменения
          git reset --hard

          # Удаляем неотслеживаемые файлы
          git clean -fd

          # Получаем последнюю версию
          git fetch origin

          # Переключаемся на develop
          git checkout develop

          # Полностью обновляем ветку
          git reset --hard origin/develop

          # Пересобираем и запускаем контейнеры
          docker compose \
            --env-file .env \
            -f infra/compose/docker-compose.local.yml \
            up -d --build

          # Проверяем backend
          sleep 15
          curl --fail http://localhost:3000/health