name: CI

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python / Backend
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - name: Install backend dependencies
        run: |
          pip install -r apps/backend/requirements.txt

      - name: Check backend syntax
        run: |
          PYTHONPYCACHEPREFIX=/tmp/pycache python -m compileall apps/backend/src

      # Node / Frontend
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      # Docker Compose validation
      - name: Validate Docker Compose config
        run: |
          docker compose \
            --env-file .env.example \
            -f infra/compose/docker-compose.local.yml \
            config

      # Docker build checks
      - name: Build backend image
        run: |
          docker build -t decision-routing-backend ./apps/backend

      - name: Build frontend image
        run: |
          docker build -t decision-routing-frontend ./apps/frontend

      - name: Start compose
        run: docker compose --env-file .env.example -f infra/compose/docker-compose.local.yml up -d --build

      - name: Wait backend
        run: |
          sleep 15
          curl --fail http://localhost:3000/health
      
      - name: Run backend tests
        run: |
          pytest apps/backend/tests

      - name: Stop compose
        if: always()
        run: docker compose --env-file .env.example -f infra/compose/docker-compose.local.yml down -v
